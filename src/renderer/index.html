<!doctype html>
<html lang="pt-BR" data-style="literary" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP relaxada para dev (HMR/React Refresh usam inline/eval). Será
         endurecida na fase de empacotamento. img-src https: permite capas remotas.
         challenges.cloudflare.com: CAPTCHA (Turnstile) — precisa carregar o script e
         renderizar o desafio num iframe; sem isso o script é injetado mas não executa. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data: readdeck-cover:; style-src 'self' 'unsafe-inline'; font-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https: readdeck-cover:"
    />
    <title>Sapien</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
